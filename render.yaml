services:
  - type: web
    name: erp-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # IMPORTANTE: Reemplaza esto con la URL real que Render le asigne a tu backend
        value: "https://tu-backend.onrender.com/api/v1" 
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
